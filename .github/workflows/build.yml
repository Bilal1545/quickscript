name: build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            artifact: qsc-linux-x86_64
            shell: bash

          - name: linux-aarch64
            os: ubuntu-24.04-arm
            artifact: qsc-linux-aarch64
            shell: bash

          - name: macos-x86_64
            os: macos-14
            artifact: qsc-macos-x86_64
            shell: bash
            arch_flag: -arch x86_64

          - name: macos-aarch64
            os: macos-14
            artifact: qsc-macos-aarch64
            shell: bash
            arch_flag: -arch arm64

          - name: windows-x86_64
            os: windows-latest
            artifact: qsc-windows-x86_64
            shell: 'msys2 {0}'
            msystem: MINGW64

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up MSYS2 (Windows)
        if: matrix.name == 'windows-x86_64'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            make

      - name: Build
        working-directory: src
        run: |
          if [ -n "${{ matrix.arch_flag }}" ]; then
            make -j2 CC="clang ${{ matrix.arch_flag }}" LDFLAGS="${{ matrix.arch_flag }}"
          elif [ "${{ matrix.name }}" = "windows-x86_64" ]; then
            # Statically link libgcc / libwinpthread so the binary has no runtime DLL deps.
            make -j2 LDFLAGS="-static -static-libgcc"
          else
            make -j2
          fi

      - name: Smoke test
        if: matrix.name != 'macos-x86_64'
        working-directory: src
        run: ./qsc --help || ./qsc --self-test || true

      - name: Stage artifact
        working-directory: src
        run: |
          mkdir -p ../dist
          if [ "${{ matrix.name }}" = "windows-x86_64" ]; then
            cp qsc.exe ../dist/${{ matrix.artifact }}.exe
            # MINGW64 build is statically linked against the C runtime — no DLLs to ship.
          else
            cp qsc ../dist/${{ matrix.artifact }}
          fi
          cp ../runtime.c ../runtime.h ../dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          if-no-files-found: error

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Package release assets
        run: |
          mkdir -p release
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            tar -czf "../release/${name}.tar.gz" -C "$dir" .
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz
          generate_release_notes: true
